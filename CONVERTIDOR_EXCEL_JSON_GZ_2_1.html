<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Convertidor APYMSA 2.1</title><script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script><style>body{font-family:Arial;background:#0b1220;color:#fff;margin:0;padding:30px}.box{max-width:800px;margin:auto;background:#f8fafc;color:#111827;padding:30px;border-radius:24px}.drop{border:2px dashed #1677ff;padding:50px;text-align:center;border-radius:18px;background:#eef5ff;cursor:pointer}button{background:#1677ff;color:#fff;border:0;border-radius:12px;padding:14px 24px;font-weight:700}.log{margin-top:20px;background:#fff;border:1px solid #cbd5e1;padding:15px;border-radius:12px;white-space:pre-wrap;font:12px monospace;max-height:320px;overflow:auto}.ok{color:#067647}.err{color:#b42318}</style></head><body><div class="box"><h1>Convertidor Excel → JSON.GZ 2.1</h1><p>Valida la nueva columna <b>codigo_nuevo</b> en productos.</p><input id="f" type="file" accept=".xlsx,.xls" hidden><div id="d" class="drop"><h2>Selecciona o arrastra el Excel</h2><button>Seleccionar archivo</button></div><div id="l" class="log">Esperando archivo...</div></div><script>
const N=v=>String(v??'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,'');const aliases={Productos:['productos','producto'],Clientes:['clientes'],Jerarquia:['jerarquia','jerarquía'],Ventas:['venta','ventas'],Disciplina:['disciplina']};const req={Productos:['codigo','descripcion_producto','marca','familia','sistema','servicio','armadora','url_imagen_marca','url_imagen_producto','precio solicitado','comentario','codigo_nuevo'],Clientes:['Cliente_id','Cliente_Vendedor_ID','razon_social','enfoque','tipo_cliente','asesor','ciudad'],Jerarquia:['asesor','gerente_regional','gerente_territorial','Sucursal_Vendedor'],Ventas:['Cliente_id','fecha_factura','Folio_factura','codigo','venta en pesos','venta en piezas'],Disciplina:['Cliente_Vendedor_ID']};const log=(m,c='')=>{l.innerHTML+=`\n<span class="${c}">${m}</span>`};function sheet(w,k){return w.SheetNames.find(x=>aliases[k].map(N).includes(N(x)))}function rows(w,n){return XLSX.utils.sheet_to_json(w.Sheets[n],{defval:'',raw:false,blankrows:false})}function missing(r,k){const h=new Set(Object.keys(r[0]||{}).map(N));return req[k].filter(x=>!h.has(N(x)))}async function go(file){l.textContent='Procesando '+file.name;try{const w=XLSX.read(await file.arrayBuffer(),{type:'array',raw:false}),data={};for(const k of Object.keys(aliases)){const n=sheet(w,k);if(!n)throw Error('Falta hoja '+k);data[k]=rows(w,n);if(!data[k].length)throw Error('Hoja vacía: '+n);const m=missing(data[k],k);if(m.length)throw Error(`Faltan columnas en ${n}: ${m.join(', ')}`);log(`${k}: ${data[k].length} registros`,'ok')}const ch=Object.keys(data.Clientes[0]).map(N),months='enero|febrero|marzo|abril|mayo|junio|julio|agosto|septiembre|octubre|noviembre|diciembre';if(!ch.some(x=>new RegExp(`^venta(${months})20\\d{2}$`).test(x))||!ch.some(x=>new RegExp(`^cuota(${months})20\\d{2}$`).test(x)))throw Error('Clientes no tiene venta/cuota mensual');const payload={metadata:{version:'2.1',createdAt:new Date().toISOString(),sourceFile:file.name},...data};const gz=pako.gzip(JSON.stringify(payload),{level:6}),blob=new Blob([gz],{type:'application/gzip'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=file.name.replace(/\.(xlsx|xls)$/i,'')+'_2_1.json.gz';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),2000);log('JSON.GZ generado correctamente','ok')}catch(e){log('ERROR: '+e.message,'err')}f.value=''}d.onclick=()=>f.click();f.onchange=e=>e.target.files[0]&&go(e.target.files[0]);['dragover','drop'].forEach(x=>d.addEventListener(x,e=>e.preventDefault()));d.ondrop=e=>e.dataTransfer.files[0]&&go(e.dataTransfer.files[0]);
</script></body></html>
